<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Surprise 🎉</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎈 BACKGROUND ANIMATION ELEMENTS -->
<div class="balloons">
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
</div>

<!-- 🔐 LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <h2>🎂 Enter Password</h2>
  <p>Hint: It’s something special 😉</p>

  <input type="password" id="password" placeholder="Enter password">

  <button onclick="checkPassword()">Unlock</button>

  <p id="error"></p>
</div>

<!-- 🎉 MAIN SITE -->
<div id="main-site" style="display:none;">

  <div class="hero">

    <h1 class="title">🎉 Happy Birthday Abhi 🎉</h1>

    <p class="subtitle">
      30 years of adventures, chaos, brilliance & memories
    </p>

    <!-- 📸 PHOTO -->
    <div class="photo-frame">
      <img src="abhi.JPG" alt="Abhi Photo" class="main-photo">
    </div>

    <!-- 🔗 LINK -->
    <a class="timeline-link" href="timeline.html">
      Abhi’s moments through 30 years →
    </a>

  </div>

</div>

<!-- 🔑 SCRIPT -->
<script>
function checkPassword() {
  const pass = document.getElementById("password").value;

  if (pass === "Naruto") {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-site").style.display = "block";

    launchConfetti(); // 🎉 trigger celebration
  } else {
    document.getElementById("error").innerText = "Wrong password 😅 Try again";
  }
}

/* 🎊 CONFETTI ENGINE */
function launchConfetti() {
  const colors = ["#ff6b6b", "#ffd93d", "#6bcB77", "#4d96ff", "#ffffff"];

  for (let i = 0; i < 120; i++) {
    const confetti = document.createElement("div");

    confetti.style.position = "fixed";
    confetti.style.width = "8px";
    confetti.style.height = "8px";
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.top = "-10px";
    confetti.style.zIndex = "9999";
    confetti.style.opacity = "1";

    document.body.appendChild(confetti);

    const animation = confetti.animate(
      [
        { transform: "translateY(0)", opacity: 1 },
        { transform: `translateY(${window.innerHeight + 100}px) rotate(720deg)`, opacity: 0 }
      ],
      {
        duration: 2000 + Math.random() * 2000,
        easing: "cubic-bezier(.1,.8,.2,1)"
      }
    );

    animation.onfinish = () => confetti.remove();
  }
}
</script>

</body>
</html>
