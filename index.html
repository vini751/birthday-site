<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Surprise 🎉</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <h2>🎂 Enter Password</h2>
  <p>Hint: It’s something special 😉</p>

  <input type="password" id="password" placeholder="Enter password">

  <button onclick="checkPassword()">Unlock</button>

  <p id="error"></p>
</div>

<!-- 🎉 MAIN SITE -->
<div id="main-site" style="display:none;">

  <div class="hero">
    <h1>Happy Birthday Abhi 🎉</h1>
    <p>30 years of adventures, chaos, brilliance & memories</p>

    <!-- 📸 PHOTO -->
    <div class="photo-frame">
      <img src="images/abhi.JPG" alt="Abhi Photo" class="main-photo">
    </div>

    <!-- 🔗 TIMELINE LINK -->
    <a class="timeline-link" href="timeline.html">
      Abhi’s moments through 30 years →
    </a>

  </div>

</div>

<!-- 🔑 PASSWORD SCRIPT -->
<script>
function checkPassword() {
  const pass = document.getElementById("password").value;

  if (pass === "Naruto") {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-site").style.display = "block";
  } else {
    document.getElementById("error").innerText = "Wrong password 😅 Try again";
  }
}
</script>

</body>
</html>
